name: Fact Checker Agent CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend-fact-checker-agent/**"
  pull_request:
    branches: [main]
    paths:
      - "backend-fact-checker-agent/**"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-fact-checker-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-fact-checker-agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t swarmx-fact-checker ./backend-fact-checker-agent
